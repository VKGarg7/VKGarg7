  <g fill="#a89a9a"><text x="46" y="252">LOCATION</text><text x="46" y="288">EXPERIENCE</text><text x="46" y="324">AVAILABILITY</text></g>
  <g fill="#f5f0f0" font-weight="700"><text x="168" y="252">India</text><text x="168" y="288">5 Months (Intern)</text><text x="168" y="324">Internships &amp; full-time roles</text></g>
</g>
