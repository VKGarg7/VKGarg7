<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="t d">
<title id="t">About and technology stack</title>
<desc id="d">Unified dashboard row containing profile information and a verified technology stack with brand icons.</desc>
<defs>
  <linearGradient id="atBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d0505"/>
    <stop offset="55%" stop-color="#0a0a0a"/>
    <stop offset="100%" stop-color="#0d0505"/>
  </linearGradient>
  <linearGradient id="atCard" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1d1414"/>
    <stop offset="45%" stop-color="#161010"/>
    <stop offset="100%" stop-color="#0e0b0b"/>
  </linearGradient>
  <linearGradient id="atCardHi" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a1414" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#3a1414" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="atAccent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff5050"/>
    <stop offset="50%" stop-color="#e50914"/>
    <stop offset="100%" stop-color="#7a0a0f"/>
  </linearGradient>
  <radialGradient id="atAvatarGlow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#ff2a2a" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="atGlowSpot" cx="15%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#e50914" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
  </radialGradient>
  <filter id="atShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <filter id="atGlow" x="-90%" y="-90%" width="280%" height="280%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="atGlowSoft" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <pattern id="atGrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
  </pattern>
</defs>

<rect width="1200" height="400" fill="url(#atBg)"/>
<rect width="1200" height="400" fill="url(#atGrid)"/>
<rect width="1200" height="140" fill="url(#atGlowSpot)"/>
<circle cx="120" cy="150" r="130" fill="#e50914" opacity="0.12" filter="url(#atGlowSoft)"/>

<g filter="url(#atShadow)">
  <rect x="20" y="16" width="390" height="368" rx="18" fill="url(#atCard)" stroke="#3a2020" stroke-width="1.5"/>
  <rect x="420" y="16" width="760" height="368" rx="18" fill="url(#atCard)" stroke="#3a2020" stroke-width="1.5"/>
</g>
<g opacity="0.8">
  <rect x="20" y="16" width="390" height="70" rx="18" fill="url(#atCardHi)"/>
  <rect x="420" y="16" width="760" height="70" rx="18" fill="url(#atCardHi)"/>
</g>
<g fill="none" stroke="url(#atAccent)" stroke-width="2" opacity="0.9">
