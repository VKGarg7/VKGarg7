  <text x="446" y="48" fill="url(#atAccent)" font-size="16" letter-spacing="1">02_</text><text x="480" y="48" fill="#fff" font-size="16" letter-spacing="1.5">TECH STACK</text>
</g>
<g fill="#3d2020"><circle cx="378" cy="42" r="3"/><circle cx="1148" cy="42" r="3"/></g>

<circle cx="128" cy="158" r="100" fill="url(#atAvatarGlow)"/>
