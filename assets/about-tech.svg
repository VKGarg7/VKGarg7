  <text x="233" y="158">complete products —</text>
  <text x="233" y="178">from reliable backends</text>
  <text x="233" y="198">to polished interfaces.</text>
</g>

<path d="M46 216h334" stroke="url(#atAccent)" stroke-opacity="0.35"/>

