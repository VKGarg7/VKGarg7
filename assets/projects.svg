<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="t d">
<title id="t">Featured projects</title>
<desc id="d">A unified row featuring CareerFlow, MovieTix and a food delivery platform.</desc>
<defs>
  <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d0505"/>
    <stop offset="55%" stop-color="#0a0a0a"/>
    <stop offset="100%" stop-color="#0d0505"/>
  </linearGradient>
  <linearGradient id="pCard" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1d1414"/>
    <stop offset="45%" stop-color="#161010"/>
    <stop offset="100%" stop-color="#0e0b0b"/>
  </linearGradient>
  <linearGradient id="pCardHi" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3a1414" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#3a1414" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="pAccent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff5050"/>
    <stop offset="50%" stop-color="#e50914"/>
    <stop offset="100%" stop-color="#7a0a0f"/>
  </linearGradient>
  <linearGradient id="pAccentV" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff4040"/>
    <stop offset="100%" stop-color="#8a0d12"/>
  </linearGradient>
  <radialGradient id="pGlowSpot" cx="50%" cy="0%" r="90%">
    <stop offset="0%" stop-color="#e50914" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
  </radialGradient>
  <filter id="pShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <filter id="pGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pGlowSoft" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10"/>
  </filter>
  <pattern id="pGrid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
  </pattern>
</defs>

<rect width="1200" height="320" fill="url(#pBg)"/>
<rect width="1200" height="320" fill="url(#pGrid)"/>
<rect width="1200" height="120" fill="url(#pGlowSpot)"/>
<path d="M400 0v320M800 0v320" stroke="#2a1010" stroke-width="1"/>

<!-- ambient corner glows behind each card -->
<circle cx="70" cy="30" r="70" fill="#e50914" opacity="0.15" filter="url(#pGlowSoft)"/>
<circle cx="470" cy="30" r="70" fill="#e50914" opacity="0.15" filter="url(#pGlowSoft)"/>
<circle cx="870" cy="30" r="70" fill="#e50914" opacity="0.15" filter="url(#pGlowSoft)"/>

<g filter="url(#pShadow)">
  <rect x="20" y="16" width="360" height="288" rx="18" fill="url(#pCard)" stroke="#3a2020" stroke-width="1.5"/>
  <rect x="420" y="16" width="360" height="288" rx="18" fill="url(#pCard)" stroke="#3a2020" stroke-width="1.5"/>
  <rect x="820" y="16" width="360" height="288" rx="18" fill="url(#pCard)" stroke="#3a2020" stroke-width="1.5"/>
</g>
<g opacity="0.8">
  <rect x="20" y="16" width="360" height="70" rx="18" fill="url(#pCardHi)"/>
  <rect x="420" y="16" width="360" height="70" rx="18" fill="url(#pCardHi)"/>
  <rect x="820" y="16" width="360" height="70" rx="18" fill="url(#pCardHi)"/>
</g>
<g fill="none" stroke="url(#pAccent)" stroke-width="2" opacity="0.9">
  <path d="M22 34V26a10 10 0 0 1 10-10h20"/>
  <path d="M422 34V26a10 10 0 0 1 10-10h20"/>
  <path d="M822 34V26a10 10 0 0 1 10-10h20"/>
</g>

<g font-family="monospace" font-size="12" font-weight="700" letter-spacing="1.5">
  <text x="44" y="48" fill="url(#pAccent)">PROJECT 01</text>
  <text x="444" y="48" fill="url(#pAccent)">PROJECT 02</text>
  <text x="844" y="48" fill="url(#pAccent)">PROJECT 03</text>
</g>
<g fill="#3d2020"><circle cx="330" cy="42" r="3"/><circle cx="730" cy="42" r="3"/><circle cx="1130" cy="42" r="3"/></g>

<g fill="#181212" stroke="#3a2424">
  <rect x="44" y="62" width="312" height="94" rx="10"/>
  <rect x="444" y="62" width="312" height="94" rx="10"/>
  <rect x="844" y="62" width="312" height="94" rx="10"/>
</g>
<g fill="#6a4a4a"><circle cx="60" cy="78" r="3"/><circle cx="72" cy="78" r="3"/><circle cx="84" cy="78" r="3"/>
<circle cx="460" cy="78" r="3"/><circle cx="472" cy="78" r="3"/><circle cx="484" cy="78" r="3"/>
<circle cx="860" cy="78" r="3"/><circle cx="872" cy="78" r="3"/><circle cx="884" cy="78" r="3"/></g>

<g filter="url(#pGlow)">
  <rect x="62" y="94" width="100" height="48" rx="12" fill="#2a1010" stroke="url(#pAccent)" stroke-width="1.8"/>
  <rect x="462" y="94" width="100" height="48" rx="12" fill="#2a1010" stroke="url(#pAccent)" stroke-width="1.8"/>
  <rect x="862" y="94" width="100" height="48" rx="12" fill="#2a1010" stroke="url(#pAccent)" stroke-width="1.8"/>
</g>
<g fill="none" stroke="url(#pAccentV)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <rect x="88" y="108" width="42" height="21" rx="3"/><path d="M98 108v-6a6 6 0 0 1 12 0v6"/>
  <rect x="488" y="102" width="52" height="27" rx="5"/><path d="M514 102v6M514 114v6M514 126v6" stroke-dasharray="1 5"/>
  <path d="M888 102v27M898 102l-6 8v19M908 102l-4 8v19"/>
</g>

<g fill="#3a2a2a"><rect x="180" y="100" width="150" height="7" rx="3"/><rect x="180" y="114" width="118" height="7" rx="3"/><rect x="180" y="128" width="86" height="7" rx="3"/>
<rect x="580" y="100" width="150" height="7" rx="3"/><rect x="580" y="114" width="118" height="7" rx="3"/><rect x="580" y="128" width="86" height="7" rx="3"/>
<rect x="980" y="100" width="150" height="7" rx="3"/><rect x="980" y="114" width="118" height="7" rx="3"/><rect x="980" y="128" width="86" height="7" rx="3"/></g>
<g fill="url(#pAccent)" filter="url(#pGlow)"><rect x="180" y="100" width="30" height="7" rx="3"/><rect x="580" y="100" width="30" height="7" rx="3"/><rect x="980" y="100" width="30" height="7" rx="3"/></g>

<g fill="#ffffff" font-family="Arial" font-size="21" font-weight="800" letter-spacing="0.4">
  <text x="44" y="192">CAREERFLOW</text>
  <text x="444" y="192">MOVIETIX</text>
  <text x="844" y="192">FOOD DELIVERY</text>
</g>

<g fill="#c9c0c0" font-family="Arial" font-size="13">
  <text x="44" y="216">Job search command center for tracking</text>
  <text x="44" y="233">applications, interviews and follow-ups.</text>
  <text x="444" y="216">Movie ticket booking with role-based</text>
  <text x="444" y="233">access, seat selection and Stripe payments.</text>
  <text x="844" y="216">Food ordering with authentication, menus</text>
  <text x="844" y="233">and restaurant order tracking.</text>
</g>

<path d="M44 252h312M444 252h312M844 252h312" stroke="url(#pAccent)" stroke-opacity="0.35"/>

<g fill="#9a8a8a" font-family="monospace" font-size="11" letter-spacing="0.5">
  <text x="44" y="272">JAVA · REACT · POSTGRES · DOCKER</text>
  <text x="444" y="272">REACT · NODE · MONGODB · STRIPE</text>
  <text x="844" y="272">REACT · NODE · MONGODB · REDUX</text>
</g>

<g font-family="monospace" font-size="10.5" font-weight="700" letter-spacing="0.5" filter="url(#pGlow)">
  <rect x="44" y="280" width="146" height="19" rx="9.5" fill="#3a1214" stroke="url(#pAccent)" stroke-width="1"/>
  <text x="54" y="293" fill="#ff5555">TOP PROJECT · LIVE</text>
  <rect x="444" y="280" width="138" height="19" rx="9.5" fill="#3a1214" stroke="url(#pAccent)" stroke-width="1"/>
  <text x="454" y="293" fill="#ff5555">FULL-STACK · LIVE</text>
  <rect x="844" y="280" width="138" height="19" rx="9.5" fill="#3a1214" stroke="url(#pAccent)" stroke-width="1"/>
  <text x="854" y="293" fill="#ff5555">FULL-STACK · LIVE</text>
</g>
</svg>
